name: Cross-Compile fbDOOM for PowerPC (SDL Mode)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-powerpc:
    runs-on: ubuntu-24.04

    steps:
    - name: Récupérer le code source
      uses: actions/checkout@v4

    - name: Installer la toolchain et SDL
      run: |
        sudo apt-get update
        # On installe la toolchain ET les bibliothèques de développement SDL pour PowerPC
        sudo apt-get install -y gcc-powerpc-linux-gnu libsdl1.2-dev:powerpc-linux-gnu make

    - name: Compiler fbDOOM en version SDL légitime
      run: |
        cd fbdoom
        make clean
        # NOSDL=0 active le mode SDL (fenêtré/propre) au lieu du framebuffer brut
        make CROSS_COMPILE=powerpc-linux-gnu- NOSDL=0 LDFLAGS="-static -lSDL -lpthread"

    - name: Sauvegarder l'exécutable
      uses: actions/upload-artifact@v4
      with:
        name: fbdoom-sdl-binary
        path: fbdoom/fbdoom
